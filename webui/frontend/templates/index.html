<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Weather MVP</title>
    <style>
      body{font-family: Arial, sans-serif; margin:2rem}
      label, input {font-size: 1rem}
      pre {background:#f6f6f6;padding:1rem}
    </style>
  </head>
  <body>
    <h1>Weather MVP</h1>
    <p>Enter a city to fetch current weather from the FastAPI backend.</p>
    <label>City: <input id="city" placeholder="London" /></label>
    <button id="go">Get Weather</button>
    <p>FastAPI: <span id="fastapi">{{ FASTAPI_URL }}</span></p>
    <h2>Result</h2>
    <pre id="out">{} </pre>

    <script>
      const fastapi = document.getElementById('fastapi').innerText || 'http://127.0.0.1:8000'
      document.getElementById('go').addEventListener('click', async () => {
        const city = document.getElementById('city').value || 'London'
        const url = new URL('/weather', fastapi)
        url.searchParams.set('city', city)
        document.getElementById('out').innerText = 'Loading...'
        try{
          const res = await fetch(url.toString())
          const json = await res.json()
          document.getElementById('out').innerText = JSON.stringify(json, null, 2)
        }catch(err){
          document.getElementById('out').innerText = String(err)
        }
      })
    </script>
  </body>
</html>
